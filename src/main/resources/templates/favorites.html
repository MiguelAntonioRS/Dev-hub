<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Favorites - OpenDev Platform</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <nav>
        <a href="/" class="brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            OpenDev
        </a>
        <ul>
            <li><a th:href="@{/resources}">Resources</a></li>
            <li><button class="theme-toggle" onclick="toggleTheme()">
                <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button></li>
            <li sec:authorize="isAuthenticated()" class="user-menu">
                <button class="user-dropdown-btn">
                    <span class="user-avatar-small" sec:authentication="name">U</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
                </button>
                <div class="user-dropdown">
                    <div class="user-dropdown-header">
                        <span class="user-avatar-small" sec:authentication="name">U</span>
                        <div><strong sec:authentication="name">User</strong></div>
                    </div>
                    <a th:href="@{/dashboard}">Dashboard</a>
                    <a th:href="@{/profile}">Edit Profile</a>
                    <a th:href="@{/favorites}">Favorites</a>
                    <div class="dropdown-divider"></div>
                    <form th:action="@{/logout}" method="post"><button type="submit" class="logout-btn">Logout</button></form>
                </div>
            </li>
        </ul>
    </nav>
</header>

<main class="container">
    <div class="page-header">
        <h1>
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            My Favorites
        </h1>
    </div>

    <div th:if="${favorites.empty}" class="empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        <h3>No favorites yet</h3>
        <p>Save resources to find them easily later!</p>
        <a th:href="@{/resources}" class="btn">Browse Resources</a>
    </div>

    <div class="resources-grid" th:if="${!favorites.empty}">
        <div th:each="fav : ${favorites}" class="resource-card">
            <div class="card-category" th:text="${fav.resource.category}">Category</div>
            <h3 th:text="${fav.resource.title}">Title</h3>
            <p class="description" th:text="${fav.resource.description}">Description</p>
            <div class="meta">
                <span><span th:text="${fav.resource.votes}">0</span> votes</span>
                <span><span th:text="${fav.resource.author}">Author</span></span>
            </div>
            <div class="resource-actions">
                <a th:href="@{'/resources/' + ${fav.resource.id}}" class="btn">View</a>
            </div>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 OpenDev Platform</p>
</footer>

<script>
function toggleTheme() {
    const html = document.documentElement;
    const icon = document.getElementById('theme-icon');
    
    if (html.getAttribute('data-theme') === 'dark') {
        html.setAttribute('data-theme', 'light');
        localStorage.setItem('theme', 'light');
        icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
    } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
        icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
    }
}

// Load saved theme
const saved = localStorage.getItem('theme');
if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
}
</script>
</body>
</html>
