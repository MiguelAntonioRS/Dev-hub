<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>OpenDev Platform</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!-- Header -->
<header>
    <nav>
        <ul>
            <li><a th:href="@{/resources}">Resources</a></li>
            <li><a th:href="@{/community}">Community</a></li>
            <li><a th:href="@{/search}">Search</a></li>
            <li sec:authorize="isAuthenticated()"><a th:href="@{/dashboard}">My Dashboard</a></li>
            <li sec:authorize="isAuthenticated()"><a th:href="@{/resources/add}">Add Resource</a></li>
            <li sec:authorize="isAnonymous()"><a th:href="@{/users/login}">Login</a></li>
            <li sec:authorize="isAnonymous()"><a th:href="@{/users/register}">Register</a></li>
            <li sec:authorize="isAuthenticated()" class="user-menu">
                <button class="user-dropdown-btn" tabindex="0" aria-label="Open user menu">
                    <span class="user-avatar-small" sec:authentication="name">U</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
                </button>
                <div class="user-dropdown" id="layout-user-dropdown">
                    <div class="user-dropdown-header">
                        <span class="user-avatar-small" sec:authentication="name">U</span>
                        <div><strong sec:authentication="name">User</strong></div>
                    </div>
                    <a th:href="@{/dashboard}">Dashboard</a>
                    <a th:href="@{/profile}">Edit Profile</a>
                    <div class="dropdown-divider"></div>
                    <form th:action="@{/logout}" method="post"><button type="submit" class="logout-btn">Logout</button></form>
                </div>
            </li>
        </ul>
    </nav>
</header>

<!-- Main content -->
<main>
    <th:block th:replace="${content}"></th:block>
</main>

<!-- Footer -->
<footer>
    <p>&copy; 2026 OpenDev Platform - All rights reserved</p>
</footer>

<script>
(function(){
  const btn = document.querySelector('.user-dropdown-btn');
  const menu = document.getElementById('layout-user-dropdown');
  if (btn && menu) {
    btn.addEventListener('click', function(e){
      e.preventDefault();
      const parent = btn.closest('.user-menu');
      if (parent) parent.classList.toggle('open');
    });
    document.addEventListener('click', function(e){
      if (!btn.contains(e.target) && !menu.contains(e.target)) {
        document.querySelectorAll('.user-menu.open').forEach(el => el.classList.remove('open'));
      }
    });
    btn.addEventListener('keydown', function(ev){
      if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); btn.click(); }
    });
  }
})();
</script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
