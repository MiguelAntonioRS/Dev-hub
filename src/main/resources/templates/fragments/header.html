<header xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras-spring-security">
    <nav>
        <a href="/" class="brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            OpenDev
        </a>
        <ul>
            <li><a th:href="@{/resources}">Resources</a></li>
            <li sec:authorize="isAuthenticated()"><a th:href="@{/dashboard}">Dashboard</a></li>
            <li sec:authorize="isAuthenticated()"><a th:href="@{/resources/add}">Add Resource</a></li>
            <li sec:authorize="isAnonymous()"><a th:href="@{/users/login}">Login</a></li>
            <li sec:authorize="isAnonymous()"><a th:href="@{/users/register}">Register</a></li>
            <li sec:authorize="isAuthenticated()" class="user-menu" id="user-menu">
                <button class="user-dropdown-btn" tabindex="0" aria-expanded="false" aria-haspopup="true">
                    <span class="user-avatar-small" sec:authentication="name">U</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
                </button>
                <div class="user-dropdown">
                    <div class="user-dropdown-header">
                        <span class="user-avatar-small" sec:authentication="name">U</span>
                        <div><strong sec:authentication="name">User</strong></div>
                    </div>
                    <a th:href="@{/dashboard}">Dashboard</a>
                    <a th:href="@{/profile}">Edit Profile</a>
                    <div class="dropdown-divider"></div>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="logout-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                            Logout
                        </button>
                    </form>
                </div>
            </li>
        </ul>
    </nav>
</header>
