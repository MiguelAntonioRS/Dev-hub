<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras-spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OpenDev Platform</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        html[data-theme="dark"] body,
        html[data-theme="dark"] .auth-container,
        html[data-theme="dark"] .auth-card,
        html[data-theme="dark"] .auth-card input,
        html[data-theme="dark"] .auth-card label,
        html[data-theme="dark"] .auth-card p {
            color: var(--text-primary) !important;
        }
        html[data-theme="dark"] .auth-card input::placeholder,
        html[data-theme="dark"] .auth-card textarea::placeholder {
            color: var(--text-secondary) !important;
        }
        html[data-theme="dark"] .auth-container a,
        html[data-theme="dark"] .auth-card .links a {
            color: var(--primary) !important;
        }
    </style>
    <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<script th:src="@{/js/dropdown.js}"></script>

<main class="auth-container">
    <div class="auth-card">
        <div class="auth-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        </div>
        <h2>Welcome Back!</h2>
        
        <div th:if="${param.error}" class="alert alert-error">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
            Invalid email or password. Please try again.
        </div>
        
        <div th:if="${param.logout}" class="alert alert-success">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            You have been logged out successfully.
        </div>
        
        <form th:action="@{/login}" method="post" class="form">
            <div class="form-group">
                <label for="username">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    Email
                </label>
                <input type="email" id="username" name="username" placeholder="your@email.com" required autofocus />
            </div>

            <div class="form-group">
                <label for="password">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    Password
                </label>
                <input type="password" id="password" name="password" placeholder="••••••••" required />
            </div>

            <button type="submit" class="btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
                Sign In
            </button>
        </form>
        
        <div class="links">
            <p>Don't have an account? <a th:href="@{/users/register}">Create one now</a></p>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 OpenDev Platform</p>
</footer>
<script>function toggleTheme(){const h=document.documentElement,i=document.getElementById('theme-icon');h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'light':'dark');localStorage.setItem('theme',h.getAttribute('data-theme'));i.innerHTML=h.getAttribute('data-theme')==='dark'?'<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line>':'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>'}if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
</body>
</html>
