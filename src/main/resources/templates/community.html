<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras-spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community - OpenDev Platform</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
    <style>
        .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; padding: 1rem; }
        .user-card { background: var(--bg-secondary); padding: 1.5rem; border-radius: 12px; text-align: center; }
        .user-avatar { width: 60px; height: 60px; border-radius: 50%; background: #7c3aed; color: white; display: inline-flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; margin-bottom: 0.5rem; }
        .btn { background: #7c3aed; color: white; padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer; }
        .btn-secondary { background: #64748b; }
    </style>
</head>
<body>
<header>
    <nav>
        <a href="/" class="brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            OpenDev
        </a>
        <ul>
            <li><a href="/resources">Resources</a></li>
            <li><a href="/community">Community</a></li>
            <li sec:authorize="isAuthenticated()"><a href="/dashboard">Dashboard</a></li>
            <li sec:authorize="isAuthenticated()"><a href="/profile">Profile</a></li>
            <li sec:authorize="isAuthenticated()"><form th:action="@{/logout}" method="post"><button type="submit" class="nav-link">Logout</button></form></li>
            <li sec:authorize="isAnonymous()"><a href="/users/login">Login</a></li>
        </ul>
    </nav>
</header>

<main class="container">
    <h1>Community</h1>
    <p>Meet other developers and follow them!</p>
    
    <div class="users-grid">
        <div th:each="user : ${users}" class="user-card">
            <div class="user-avatar" th:text="${user.username.substring(0,1).toUpperCase()}">U</div>
            <h3 th:text="${user.username}">Username</h3>
            <p th:text="${user.bio}" style="color: var(--text-secondary); font-size: 0.875rem;">Bio</p>
            
            <div style="margin-top: 1rem;">
                <span th:if="${followingUsers.contains(user)}">
                    <form th:action="@{'/follow/' + ${user.id} + '/unfollow'}" method="post">
                        <button type="submit" class="btn btn-secondary">Following</button>
                    </form>
                </span>
                <span th:unless="${followingUsers.contains(user)}">
                    <form th:if="${currentUser?.id != user.id}" th:action="@{'/follow/' + ${user.id}}" method="post">
                        <button type="submit" class="btn">Follow</button>
                    </form>
                </span>
            </div>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 OpenDev Platform</p>
</footer>
</body>
</html>
