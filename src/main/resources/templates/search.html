<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras-spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - OpenDev Platform</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
    <style>
        .search-container { max-width: 800px; margin: 0 auto; padding: 2rem; }
        .search-container h1 { color: var(--text-primary); }
        .search-form { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
        .search-form input { flex: 1; padding: 0.75rem; border: 2px solid var(--border-color); border-radius: 8px; font-size: 1rem; background: var(--bg-primary); color: var(--text-primary); }
        .search-form input::placeholder { color: var(--text-secondary); }
        .search-form button { background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer; }
        .results-section { margin-bottom: 2rem; }
        .results-section h2 { border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; margin-bottom: 1rem; color: var(--text-primary); }
        .result-card { background: var(--bg-secondary); padding: 1rem; border-radius: 8px; margin-bottom: 0.5rem; }
        .result-card h3 { margin: 0 0 0.5rem 0; color: var(--text-primary); }
        .result-card a { color: var(--primary); }
        .result-card p { color: var(--text-secondary); }
    </style>
</head>
<body>
<header>
    <nav>
        <a href="/">OpenDev</a>
        <ul>
            <li><a href="/resources">Resources</a></li>
            <li><a href="/community">Community</a></li>
            <li sec:authorize="isAuthenticated()"><a href="/dashboard">Dashboard</a></li>
            <li sec:authorize="isAuthenticated()"><a href="/profile">Profile</a></li>
            <li sec:authorize="isAuthenticated()"><form th:action="@{/logout}" method="post"><button type="submit" class="nav-link">Logout</button></form></li>
            <li sec:authorize="isAnonymous()"><a href="/users/login">Login</a></li>
        </ul>
    </nav>
</header>

<main class="container">
    <div class="search-container">
        <h1>Search</h1>
        
        <form th:action="@{/search}" method="get" class="search-form">
            <input type="text" name="q" th:value="${query}" placeholder="Search resources, users..."/>
            <button type="submit">Search</button>
        </form>
        
        <div th:if="${query != null and resources != null and not resources.isEmpty()}" class="results-section">
            <h2>Resources (<span th:text="${resources.size()}">0</span>)</h2>
            <div th:each="r : ${resources}" class="result-card">
                <h3><a th:href="@{'/resources/' + ${r.id}}" th:text="${r.title}">Title</a></h3>
                <p th:text="${r.description}">Description</p>
            </div>
        </div>
        
        <div th:if="${query != null and users != null and not users.isEmpty()}" class="results-section">
            <h2>Users (<span th:text="${users.size()}">0</span>)</h2>
            <div th:each="u : ${users}" class="result-card">
                <h3><a th:href="@{'/users/' + ${u.id}}" th:text="${u.username}">Username</a></h3>
                <p th:text="${u.bio}">Bio</p>
            </div>
        </div>
        
        <div th:if="${query != null and (resources == null or resources.isEmpty()) and (users == null or users.isEmpty())}">
            <p>No results found for "<span th:text="${query}">query</span>"</p>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 OpenDev Platform</p>
</footer>
</body>
</html>
