<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::body})}">
<body>
<section class="form-container">
    <h2>Add New Resource</h2>
    <form th:action="@{/resources/add}" th:object="${resource}" method="post">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" th:field="*{title}" required />
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}" required></textarea>
        </div>

        <div class="form-group">
            <label for="author">Author</label>
            <input type="text" id="author" th:field="*{author}" required />
        </div>

        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" th:field="*{category}" required>
                <option value="Lenguaje">Lenguaje</option>
                <option value="Framework">Framework</option>
                <option value="Frontend">Frontend</option>
                <option value="DevOps">DevOps</option>
                <option value="Database">Database</option>
            </select>
        </div>

        <button type="submit" class="btn">Save Resource</button>
    </form>
</section>
</body>
</html>
