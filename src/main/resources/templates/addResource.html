<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Resource - OpenDev Platform</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        html[data-theme="dark"] body,
        html[data-theme="dark"] .form,
        html[data-theme="dark"] .form-group label {
            color: var(--text-primary) !important;
        }
        html[data-theme="dark"] .form input,
        html[data-theme="dark"] .form textarea,
        html[data-theme="dark"] .form select {
            background: var(--bg-primary);
            color: var(--text-primary);
            border-color: var(--border-color);
        }
    </style>
</head>
<body>
<header>
    <nav>
        <ul>
            <li><a th:href="@{/resources}">Resources</a></li>
            <li><a th:href="@{/dashboard}">My Dashboard</a></li>
            <li><form th:action="@{/logout}" method="post" style="display:inline;"><button type="submit" class="nav-link">Logout</button></form></li>
        </ul>
    </nav>
</header>

<main class="container">
    <h2>Add New Resource</h2>
    <form th:action="@{/resources/add}" th:object="${resource}" method="post" class="form">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" th:field="*{title}" required />
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}" rows="4" required></textarea>
        </div>

        <div class="form-group">
            <label for="link">Link (URL)</label>
            <input type="url" id="link" th:field="*{link}" placeholder="https://..." required />
        </div>

        <div class="form-group">
            <label for="author">Author</label>
            <input type="text" id="author" th:field="*{author}" required />
        </div>

        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" th:field="*{category}" required>
                <option value="">Select Category</option>
                <option value="Lenguaje">Lenguaje</option>
                <option value="Framework">Framework</option>
                <option value="Frontend">Frontend</option>
                <option value="DevOps">DevOps</option>
                <option value="Database">Database</option>
                <option value="Tool">Tool</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="type">Type</label>
            <select id="type" th:field="*{type}" required>
                <option value="">Select Type</option>
                <option value="Tutorial">Tutorial</option>
                <option value="Library">Library</option>
                <option value="Example">Example</option>
                <option value="Documentation">Documentation</option>
                <option value="Course">Course</option>
                <option value="Tool">Tool</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Save Resource</button>
            <a th:href="@{/resources}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</main>

<footer>
    <p>&copy; 2026 OpenDev Platform</p>
</footer>
<script>function toggleTheme(){const h=document.documentElement,i=document.getElementById('theme-icon');h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'light':'dark');localStorage.setItem('theme',h.getAttribute('data-theme'));i.innerHTML=h.getAttribute('data-theme')==='dark'?'<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line>':'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>'}if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
</body>
</html>
