<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras-spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - OpenDev Platform</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
    <style>
        html[data-theme="dark"] .profile-section,
        html[data-theme="dark"] .profile-section h1,
        html[data-theme="dark"] .profile-section h2,
        html[data-theme="dark"] .profile-section label,
        html[data-theme="dark"] .profile-section input,
        html[data-theme="dark"] .profile-section textarea,
        html[data-theme="dark"] .profile-section p,
        html[data-theme="dark"] .profile-section .badge {
            color: var(--text-primary);
        }
        html[data-theme="dark"] .profile-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
        }
        .profile-page { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
        .profile-section {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--shadow-lg);
            margin-bottom: 2rem;
        }
        .profile-section h2 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .profile-row {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }
        .profile-col {
            flex: 1;
            min-width: 250px;
        }
        .profile-avatar-big {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        .profile-avatar-big img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-primary);
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            background: var(--bg-primary);
            color: var(--text-primary);
            box-sizing: border-box;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--gray); color: white; }
        .btn:hover { opacity: 0.9; }
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .alert-success { background: #d1fae5; color: #065f46; }
        .alert-error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
<header>
    <nav>
        <a href="/" class="brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            OpenDev
        </a>
        <ul>
            <li><a th:href="@{/resources}">Resources</a></li>
            <li><a th:href="@{/dashboard}">Dashboard</a></li>
            <li><a th:href="@{/profile}" class="active">Profile</a></li>
            <li><form th:action="@{/logout}" method="post" style="display:inline;"><button type="submit" class="nav-link">Logout</button></form></li>
        </ul>
    </nav>
</header>

<main class="container">
    <div th:if="${param.success}" class="alert alert-success">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        Profile updated successfully!
    </div>

    <div th:if="${error}" class="alert alert-error">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
        <span th:text="${error}">Error</span>
    </div>

    <div class="profile-page">
        <div class="profile-section">
            <div class="profile-row">
                <div class="profile-col">
                    <div class="profile-avatar-big">
                        <img th:if="${user.avatar != null and user.avatar != ''}" th:src="${user.avatar}" alt="Avatar"/>
                        <span th:if="${user.avatar == null or user.avatar == ''}" th:text="${#strings.substring(user.username, 0, 1).toUpperCase()}">U</span>
                    </div>
                    <p><strong th:text="${user.username}">Username</strong></p>
                    <p style="color: var(--text-secondary);" th:text="${user.email}">email@example.com</p>
                    <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:0.5rem;">
                        <span class="badge" style="background:var(--primary); color:white; padding:0.2rem 0.6rem; border-radius:20px; font-size:0.75rem;" th:text="${user.role}">USER</span>
                        <span style="background:#fef3c7; color:#92400e; padding:0.2rem 0.6rem; border-radius:20px; font-size:0.75rem;">&#9733; <span th:text="${user.reputation}">0</span> reputation</span>
                    </div>
                </div>
            </div>
        </div>

        <form th:action="@{/profile}" method="post" class="profile-section">
            <h2>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                Edit Profile
            </h2>

            <div class="profile-row">
                <div class="profile-col">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" th:value="${user.username}" placeholder="Your username" required/>
                    </div>

                    <div class="form-group">
                        <label for="bio">Bio</label>
                        <textarea id="bio" name="bio" rows="4" placeholder="Tell us about yourself..." th:text="${user.bio}"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="avatar">Avatar URL</label>
                        <input type="url" id="avatar" name="avatar" th:value="${user.avatar}" placeholder="https://example.com/avatar.jpg"/>
                    </div>
                </div>

                <div class="profile-col">
                    <div class="form-group">
                        <label for="github">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline; vertical-align:middle;">
                                <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.65 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
                            </svg>
                            GitHub Username
                        </label>
                        <input type="text" id="github" name="github" th:value="${user.github}" placeholder="username"/>
                    </div>

                    <div class="form-group">
                        <label for="twitter">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline; vertical-align:middle;">
                                <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 4.67A11.6 11.6 0 0 1 3 2v2a5.5 5.5 0 0 0 2.88 4.48 4.36 4.36 0 0 1-2.1.77 4.35 4.35 0 0 0 3.6 4.26A4.5 4.5 0 0 1 3 19.5a8.91 8.91 0 0 1-4-.75 4.45 4.45 0 0 0 3.53 4.41 4.28 4.28 0 0 1-1.9.06 4.48 4.48 0 0 0 4.18 3.1 9.09 9.09 0 0 1-5.5 1.9A9.34 9.34 0 0 1 3 12"></path>
                            </svg>
                            Twitter Username
                        </label>
                        <input type="text" id="twitter" name="twitter" th:value="${user.twitter}" placeholder="@username"/>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                    Save Changes
                </button>
                <a th:href="@{/dashboard}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</main>

<footer>
    <p>&copy; 2026 OpenDev Platform</p>
</footer>
<script>function toggleTheme(){const h=document.documentElement,i=document.getElementById('theme-icon');h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'light':'dark');localStorage.setItem('theme',h.getAttribute('data-theme'));i.innerHTML=h.getAttribute('data-theme')==='dark'?'<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line>':'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>'}if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
</body>
</html>
