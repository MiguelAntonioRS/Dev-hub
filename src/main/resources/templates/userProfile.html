<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras-spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${profileUser.username} + ' - OpenDev Platform'">User Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
    <style>
        [data-theme="dark"] .profile-page, [data-theme="dark"] .profile-info, [data-theme="dark"] h1, [data-theme="dark"] p { color: var(--text-primary); }
        .profile-page { max-width: 800px; margin: 0 auto; padding: 2rem; }
        .profile-header { display: flex; gap: 2rem; align-items: center; margin-bottom: 2rem; }
        .profile-avatar-large { width: 100px; height: 100px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; }
        .profile-avatar-large img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; }
        .profile-info h1 { margin-bottom: 0.5rem; }
        .profile-stats { display: flex; gap: 1.5rem; margin-top: 1rem; }
        .stat { background: var(--bg-secondary); padding: 0.75rem 1.5rem; border-radius: 8px; text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: bold; display: block; }
        .stat-label { font-size: 0.875rem; color: var(--text-secondary); }
        .btn-follow { background: var(--primary); color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        .btn-unfollow { background: var(--gray); color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>
<header>
    <nav>
        <a href="/" class="brand">💻 OpenDev</a>
        <ul>
            <li><a th:href="@{/resources}">Resources</a></li>
            <li sec:authorize="isAuthenticated()"><a th:href="@{/dashboard}">Dashboard</a></li>
            <li sec:authorize="isAuthenticated()"><a th:href="@{/profile}">Profile</a></li>
            <li sec:authorize="isAnonymous()"><a th:href="@{/users/login}">Login</a></li>
            <li sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post"><button type="submit" class="nav-link">Logout</button></form>
            </li>
        </ul>
    </nav>
</header>

<main class="container">
    <div class="profile-page">
        <div class="profile-header">
            <div class="profile-avatar-large">
                <img th:if="${profileUser.avatar}" th:src="${profileUser.avatar}" alt="Avatar"/>
                <span th:if="${!profileUser.avatar}" th:text="${#strings.toUpperCase(#strings.substring(profileUser.username, 0, 1))}">U</span>
            </div>
            <div class="profile-info">
                <h1 th:text="${profileUser.username}">Username</h1>
                <p th:text="${profileUser.bio}">User bio</p>
                <div class="profile-stats">
                    <div class="stat">
                        <span class="stat-value" th:text="${followerCount}">0</span>
                        <span class="stat-label">Followers</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" th:text="${followingCount}">0</span>
                        <span class="stat-label">Following</span>
                    </div>
                </div>
                <div style="margin-top: 1rem;">
                    <span th:if="${isFollowing}">
                        <form th:action="@{'/follow/' + ${profileUser.id} + '/unfollow'}" method="post">
                            <button type="submit" class="btn-unfollow">Unfollow</button>
                        </form>
                    </span>
                    <span th:if="${!isFollowing and !isSameUser}">
                        <form th:action="@{'/follow/' + ${profileUser.id}}" method="post">
                            <button type="submit" class="btn-follow">Follow</button>
                        </form>
                    </span>
                </div>
            </div>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 OpenDev Platform</p>
</footer>
</body>
</html>
