<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras-spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - OpenDev Platform</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
    <style>
        .profile-page { max-width: 800px; margin: 0 auto; padding: 2rem; text-align: center; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: #7c3aed; color: white; display: inline-flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; margin-bottom: 1rem; }
        .btn { background: #7c3aed; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 8px; cursor: pointer; }
        .btn-secondary { background: #64748b; }
    </style>
</head>
<body>
<header>
    <nav>
        <a href="/">OpenDev</a>
        <ul>
            <li><a href="/resources">Resources</a></li>
            <li><a href="/users/login">Login</a></li>
        </ul>
    </nav>
</header>

<main class="container">
    <div class="profile-page">
        <div class="profile-avatar" th:text="${profileInitial}">U</div>
        
        <h1 th:text="${profileUser?.username}">Username</h1>
        
        <p th:text="${profileUser?.bio}">Bio</p>
        
        <div style="display: flex; gap: 1rem; justify-content: center; margin: 1rem 0;">
            <div><span th:text="${followerCount}">0</span><br/><small>Followers</small></div>
            <div><span th:text="${followingCount}">0</span><br/><small>Following</small></div>
        </div>
        
        <div>
            <span th:if="${isFollowing}">
                <form th:action="@{'/follow/' + ${profileUser?.id} + '/unfollow'}" method="post">
                    <button type="submit" class="btn btn-secondary">Unfollow</button>
                </form>
            </span>
            <span th:if="${!isFollowing and !isSameUser}">
                <form th:action="@{'/follow/' + ${profileUser?.id}}" method="post">
                    <button type="submit" class="btn">Follow</button>
                </form>
            </span>
        </div>
    </div>
</main>

<footer style="text-align:center; padding: 2rem; color: var(--text-secondary); margin-top: 2rem;">
    <p>© 2026 OpenDev Platform</p>
</footer>
</body>
</html>
