<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::body})}">
<body>
<section class="resources-container">
    <h2>Available Resources</h2>

    <form th:action="@{/resources}" method="get" class="filter-form">
        <label for="category">Filter by Category:</label>
        <select id="category" name="category">
            <option value="">All</option>
            <option value="Lenguaje">Lenguaje</option>
            <option value="Framework">Framework</option>
            <option value="Frontend">Frontend</option>
            <option value="DevOps">DevOps</option>
            <option value="Database">Database</option>
        </select>
        <button type="submit" class="btn">Filter</button>
    </form>

    <div th:each="resource : ${resources}" class="resource-card">
        <h3 th:text="${resource.title}">Resource Title</h3>
        <p th:text="${resource.description}">Resource description goes here...</p>
        <p><strong>Author:</strong> <span th:text="${resource.author}">Author Name</span></p>
        <p><strong>Category:</strong> <span th:text="${resource.category}">Category</span></p>
        <p><strong>Votes:</strong> <span th:text="${resource.votes}">0</span></p>

        <div sec:authorize="isAuthenticated()">
            <form th:action="@{'/votes/' + ${resource.id} + '/upvote'}" method="post">
                <button type="submit" class="btn">Upvote</button>
            </form>
            <form th:action="@{'/votes/' + ${resource.id} + '/downvote'}" method="post">
                <button type="submit" class="btn">Downvote</button>
            </form>
        </div>

        <div class="resource-actions">
            <a th:href="@{'/resources/' + ${resource.id}}" class="btn">View Details</a>
        </div>

        <div sec:authorize="hasRole('ADMIN')">
            <form th:action="@{'/resources/delete/' + ${resource.id}}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
        </div>
    </div>

    <div sec:authorize="hasRole('ADMIN')" class="add-resource-link">
        <a th:href="@{/resources/add}" class="btn">Add New Resource</a>
    </div>
</section>
</body>
</html>
